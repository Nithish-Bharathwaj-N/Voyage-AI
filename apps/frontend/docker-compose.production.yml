version: '3.8'

services:
  web:
    image: voyageai-frontend:production
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voyageai-frontend-prod
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
    env_file:
      - .env.production
    ports:
      - "80:3000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
