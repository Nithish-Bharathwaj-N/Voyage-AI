name: VoyageAI Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: voyageai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.9.0

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Type check code
      run: pnpm run typecheck

    - name: Lint code
      run: pnpm run lint

    - name: Build project
      run: pnpm run build

    - name: Setup Test Environment Variables
      run: |
        echo "DATABASE_URL=postgresql://postgres:password@localhost:5432/voyageai_test?schema=public" >> $GITHUB_ENV
        echo "SUPABASE_URL=https://mock.supabase.co" >> $GITHUB_ENV
        echo "SUPABASE_ANON_KEY=mock-key" >> $GITHUB_ENV
        echo "SUPABASE_SERVICE_ROLE_KEY=mock-service-key" >> $GITHUB_ENV
        echo "SUPABASE_JWT_SECRET=mock-jwt-secret-with-at-least-32-chars-long" >> $GITHUB_ENV
        echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
        echo "PORT=3000" >> $GITHUB_ENV
        echo "NODE_ENV=test" >> $GITHUB_ENV

    - name: Generate Prisma client
      run: pnpm prisma generate

    - name: Run unit and integration tests
      run: pnpm run test

    - name: Run E2E tests
      run: pnpm run test:e2e

    - name: Audit dependencies
      run: pnpm audit --audit-level=high || true

    - name: Test Docker build
      run: docker build -t voyageai-backend:test .
