version: '3.8'

services:
  app:
    image: voyageai-backend:production
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voyageai-backend-prod
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: voyageai-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: voyageai_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voyageai_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voyageai-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata_prod:/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
  redisdata_prod:
