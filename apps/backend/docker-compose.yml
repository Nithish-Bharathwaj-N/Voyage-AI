version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: voyageai-postgres
    restart: always
    environment:
      POSTGRES_DB: voyageai_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: voyageai-redis
    restart: always
    ports:
      - "6375:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
